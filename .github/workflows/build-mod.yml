name: Build Mod Release

on:
  release:
    types: [published]

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build mod archive (ZIP)
        run: |
          zip -r FS25_constructionFavorites.zip scripts/ l10n/ menu/ modDesc.xml icon_constructionFavorites.dds

      - name: Upload mod release asset
        uses: softprops/action-gh-release@v2
        with:
          files: FS25_constructionFavorites.zip
